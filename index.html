<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Embed Test</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e8e3d8;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 14px 32px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: #0a0a0f;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #c9a84c;
      flex-shrink: 0;
    }

    .embed-area {
      flex: 1;
      width: 100%;
    }

    #gc-embedded-div {
      width: 100%;
      height: 100%;
    }
  </style>

  <!-- GOLDCAST REGISTRATION EMBED SCRIPT (if testing registration) -->
  <!-- <script src="https://dnf20ypvrc856.cloudfront.net/embed.js"></script> -->

</head>
<body>

  <header>Welcome to EU Region custom webpage for embed testing</header>

  <div class="embed-area">

    <!-- PASTE YOUR GOLDCAST EMBED CODE BELOW -->

    <div id="gc-embedded-div"></div>
    <script src="https://embedded.sdk.goldcast.io/embedded-sdk.js"></script>
    <script>
      const config = {
        eventID: '8c2065b5-5ea8-43fe-81b5-b86dca2ca4f7',
        embeddedServerUrl: 'https://embedded-server.goldcast.io',
        height: '100%',
        width: '100%'
      };
      const renderEmbeddedWidget = new window.GOLDCAST.RenderEmbeddedWidget(config);
      renderEmbeddedWidget.init();
    </script>

    <!-- END GOLDCAST EMBED CODE -->

  </div>

</body>
</html>
